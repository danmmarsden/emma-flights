<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <title>LBA Arrivals & Departures</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <h1>LBA Arrivals &amp; Departures</h1>
        <p class="intro">
          Step through LBA schedule data day by day, with a quick Jet2-only filter and no server dependency in production.
        </p>

        <div class="controls">
          <div class="day-nav" aria-label="Day navigation">
            <button id="previousDayButton" class="nav-button" type="button">Previous day</button>
            <button id="nextDayButton" class="nav-button" type="button">Next day</button>
          </div>

          <div class="view-toggle" aria-label="Flight type toggle">
            <button id="departuresToggle" class="view-toggle-button is-active" type="button">Departures</button>
            <button id="arrivalsToggle" class="view-toggle-button" type="button">Arrivals</button>
          </div>

          <label class="toggle">
            <input id="jet2Only" type="checkbox">
            <span>Jet2 only</span>
          </label>

          <button id="jumpTodayButton" class="refresh-button" type="button">Jump to today</button>
        </div>

        <div class="meta-row">
          <p id="statusText" class="status-text">Loading flights...</p>
          <p id="sourceText" class="source-text"></p>
        </div>
      </section>

      <section id="results" class="results-grid" aria-live="polite"></section>
    </main>

    <template id="dayTemplate">
      <article class="day-card">
        <div class="day-header">
          <div>
            <p class="day-label"></p>
            <h2 class="day-date"></h2>
          </div>
          <span class="pill total-pill"></span>
        </div>

        <div class="tables">
          <section class="table-card departures-section">
            <div class="table-header">
              <h3>Departures</h3>
              <span class="pill departures-pill"></span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Time</th>
                    <th>Flight</th>
                    <th>Airline</th>
                    <th>Destination</th>
                  </tr>
                </thead>
                <tbody class="departures-body"></tbody>
              </table>
            </div>
          </section>

          <section class="table-card arrivals-section">
            <div class="table-header">
              <h3>Arrivals</h3>
              <span class="pill arrivals-pill"></span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Time</th>
                    <th>Flight</th>
                    <th>Airline</th>
                    <th>Origin</th>
                  </tr>
                </thead>
                <tbody class="arrivals-body"></tbody>
              </table>
            </div>
          </section>
        </div>
      </article>
    </template>

    <dialog id="flightModal" class="flight-modal">
      <div class="flight-modal-card">
        <button id="closeFlightModalButton" class="flight-modal-close" type="button" aria-label="Close details">Close</button>
        <p id="flightModalEyebrow" class="flight-modal-eyebrow"></p>
        <h2 id="flightModalTitle" class="flight-modal-title"></h2>
        <p id="flightModalSubtitle" class="flight-modal-subtitle"></p>
        <div id="flightModalGrid" class="flight-modal-grid"></div>
      </div>
    </dialog>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
